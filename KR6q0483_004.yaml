body:
  text: 侍子興㲈同門人興斧編佛事七祖塯拈香曹溪逆流第一滴兩腳登山衣不溼卻笑落與不落猶是階級雖然廬陵米價遇貴即賤到底無人酬值且看無影樹下荊條生一任青天掃蕩建立石頭遷祖像前拈香推倒南嶽跌殺隱峰一柄鈯斧子至今常削風但插三枝黃屑香不妨註破你的參同鈯補處縣天界老和尚真拈香鼻孔向上齒暴當門雪劍倒揮天出血洞簾常捲月無痕今朝送入青原鈯補處斧斤風裏返香魂拈香云只如這一爐香不知是藥地燒杖人不知是杖人燒藥地聞麼毒哉以手左右揮云大眾退後近傍不得天界老和尚生辰上供橫身水火慰縣弧正命如絲老托孤一掌竹關逢債主達磨盤子踏翻無看看杖人生也三杯冷茶如何為他洗屈聻誰聽貓兒㘞地喊九龍一口吐江湖臘月十三日七祖忌辰上供千年一臘不曾忘晴放毘盧背後光巖下梅花齊報喜殿前二桂久昌昌不肖初忝祖庭無能為獻聊以荊條來掃地古爐倒插一枝香臘月二十五日石頭遷祖像前上供山中傳下無虛實是生是死在今日雲門臘月二十五遂與一掌即三十酹茶云從今記取年年一滴正月二日七祖生辰上供無死生至今生本地劉村記下今辰二月二當中春攀條拂地飛香雲且道腳下濟濟以何供養天在山中青不改桃花松桂四時新二月二十三設潛夫府君位上供我父晚徑十五霜公因反因開天荒中五旋四縣天綱準不亂享神無方晝夜生死歸大常層樓奧室陽為堂井瓢灶火傳燈光生生本無生代明而錯行今日青原燒此香時乘午會當闡揚別峰酌水朝故鄉供養萬世恩無疆母吳太恭人忌日燒香師云忽然四十有三年孝滿曹山發酒顛今日西江烹雪水不知忉利是何天吾母太恭人秉蓮池戒受博山乳總是三一之淵源孤兒撞入天界毘盧閣拈出四大性自復了卻金字華嚴昨夜通兒忽到言及一喝嚴背芝產甘泉十孫具足清芬八十念此天邊又定建報親菴于觀音巖前且道此處以何為供恰度了剷草僧一員笑峰和尚龕前拈香時倪止先請回白下特地重開七祖顏五年冷笑碧潺潺今日逼出鰲山弟朁把黃荊一字關噫起龕師以杖打圓相云見麼葉落冬春無去來荊條有口沒安排太陽山上歸根處刀斧知恩砍不開秪如我笑峰和尚江東夫子內紹靈苗末遇杖人舍身藥樹熄邪一吼敓西震東瓶洒西江重顏七祖金鳳宿龍巢別峰無非玉殿麟角藏水牯出關仍唱還鄉毘盧有父全身室內不知獅子教兒返擲終歸本位萬古之微猷不昧寶鏡之奉順昭然有於此見得透者立處知恩報恩如或未然直須途中竭力即今法嗣載上青原血胤請歸白下玄沙報父羅𬑟克家此一往反旁觀不識正因有在智者撫心且道正起龕時撫心一句作麼生寫照正命靈光亙今古負天一笑五雲中以杖敲云起紹宗堂為笑和上設供隨擲蒲鞋已六年棲霞風雨到青原相牽水碓舂新米斧劈柴頭冷灶煙便拈香云不用叫蒼天笑和上衣缽塔成設供師云霜曉翠微白日落黃原紫案山無縫塔新縣年年一杯古澗水大眾看看笑老人開口麼是誰禪床震動尚勞挂齒為不釐務芝穎化禪師起龕惟我芝公織芒立地水凌加霜信手吹毛刺天出血少年隨隱石船早被嚴菴逼出遍蹋諸方不顧乃脫桶于青原正謂鞭岳轉風不意抽身太早病中水火正急讓你笑傲一春午時四句臨行還塞高峰一問且問白馬曇照之苦苦何似大梅鼯鼠之唧唧青原大眾為君結舌還識得此晴空霹靂麼老僧則更請芝公趲出涅槃堂為天下苦心人一場痛快去也舉火瓦針艾團自己勦絕更有火柴頭為人須為徹千生哭笑太淆訛到此用得用不得然則芝公粉碎一句作麼生與人受用聻鷓鴣原上火燒碧待月溪流常不歇設供閉門風雨相看啞倚柱雷霆亦不聞豈非蕭江相見一絕看不盡時皆壁立到無餘地一潭收豈非梅陂相賞一絕青又菴裏幾月苦茶今日面前一杯噴雪不如仍舉碗撻丘作供親切旁觀者痛笑老人失卻靈芝骨血我則謂即今一問脫穎尤捷噫眼淚落也復有何說象石橋流為汝嗚咽移鐘版上中五堂玉界金繩千聖不越今日從左手向背上一槌不妨奇特天地聽其指揮狡狐聞之膽裂將謂頑銅斷木儼然金口木舌且道超出人天號令人天移將來不移易一絲毫是何等恩力擊鐘版一下曰前後際斷天然中節為泯菴心維那起龕維那一生鐵脊青原累汝兩冬釣臺凝翠亭間龍洲劍挂眉峰一病待我武功來送汝夏月水條風我到單前問予作麼生曰一切不煩常住我問生平底事到此何如曰惟乞和尚一把火維那今日藉大眾手更為汝拶出遮窠臼直令黃金骨照青山紅舉火橋下水流何浩浩藥籠風割夏枯草且看脫體無依亂石場驚起鐵牛啣束槁以矩打圓相秪如生死不道大眾如何證得此炬恩力耶圓光直徹威音前爍破形山誰是摩尼寶入塔指骨云泯菴維那一條硬木風削千章撞著青原劈碎宮商生也鴈字過江死也劍倚天長全身送入青青裏不似人間釘野椿大眾到遮裏轉位回身一句作麼生吐氣聻以杖擊地云大地一彈皆起舞萬峰雲裏響飛泉為曇白御禪人起龕笑雙二老處六年侍者撞到青原一年結款曇白你高峰一句罷參了也只可以勦截臨行風雨策勵不可讓人漫道白髮龍鍾送少年芝穎大師忌無門師設供請于塔前拈香翠屏背面千秋綠恰將老人衣塔藏靈骨今日芝公死也生無門逼汝伸雙足師一笑友一哭旁有嚴菴鼓一曲誰知碗躂丘迸碎蒼龍窟大眾澆此一杯穀雨茶看見芝公為人漱口麼祈雨拈香一滴甘露瓶從來不著價囑付娑竭龍為民護苗稼百尺深潭飛半空中間起雲四邊下為知客幻菴慧舉火永嘉過嶺幾冬春滑到青原了此因去冬末後句咄咄莫欺人一病四旬竟不呻吟豈待如今來問疏親且道翻身向何處去依然劫火橫身為侍者夜露舉火相隨十六年一拙送汝老興曉如今曉了將謂是禿帚撒花秪引箇火牛啣草為大覺菴知客元長入塔以虎終卓杖云看見此公一場奪食徹骨流風麼慧消平等善長歸元行腳一回幾緉草鞋生耳復還故處栴檀瑞像偕來護木又而享三昧佐大覺以接十方末後一著不妨驚人今日拶到此處今古同參渾忘主伴江濤山月供養千秋且道咬斷命根入穴得子又作麼生呵氣聻試問長沙岑大蟲牛頭何引祖師怕卓杖云吽九月初七日天界老和尚忌辰上供重陽節到霜風飄眼珠秋水嘗滿瓢三百首詩不容人見蹋翻盤子半字無交半字無交為甚年年此際觸著今朝燒香云啼笑難分總一燒為幻菴慧知客入塔作圓相云環此蒼蒼誰出沒投林入火空彔彔雖則師子座前少一擲無縫塔裏添真骨又且有伴同歸誰信黃金一國既到此處觸著聊將何語證痛耶不須重與解連環黃葉滿天啼不足荊樹下建新禪堂上梁青青煉就真丹土荊條鞭作金剛杵順水把關從誇雙象須信截流在此伏虎試看縱十八橫十五劈碎虛空天然規矩漫說功全憑一斧且道今日如何喝采天明向上只平看千手同心一時舉藥樹堂成挂鐘版師云新堂古法時至舉揚號令人天鉗鎚佛祖只須從遮一下證入即從遮一下粉碎乃擊鐘版云灼然不移易一絲毫許禪堂安文殊菩薩拈香漫疑黑豆未生芽開閉樓頭眼易花莫戀福城東廟住忽然垂臂怎酬他燒香云大眾文殊菩薩來也在山僧指頭上作大獅子吼鑽入諸人頂門從腳尖上出來道恭喜恭喜一箇箇立地成佛作祖去見麼且道如何酬他乃彈指一下聞三宜和尚訃上供面未相識天外回頭多勞寄信以沉為浮共道西湖舞棹三寸離鉤休休覆卻虛舟聊獻一杯寒澗水雲中開口滿天流竺和尚訃至設供骨肉雖同門一生不相識方期南浦會撞倒海波泣炮莊頭上太煞逍遙三彙灰中依然未集今日聊烹雪水恰是除年虀粒伏惟法兄和上來中五堂破口一吸顧左右云見麼哭不及笑不及是誰嗅著些氣息小年供西歸日送眉菴秀和上木主入祖堂刮地剛風祖庭水冷眉菴和上于兵燹裏扶起剎竿鎔銅浴佛騎殿當門捨骨掩泥披鎧出岸恰是五逆聞雷吹光度刃不妨鼓鐵綽板唱大江詞有時穆滿駕八駿固令汲冢放光有時紀信乘九龍換卻重瞳叱吒奇哉魁壘足勝赤幡移步龍須豎拂臨行筋斗翻空繼聲塗毒鏗鏘好聽祖堂合奏今請入此大香爐中長熏鼻孔露柱與古帆稱賀有伴即來倒荊與雙桂同拈望峰作禮且道長熏鼻孔作麼生一句為後人通嚏耶普供西歸冰臘水眉毛尚饗剔燈看設供瞎驢滅卻粒米何消此中無位次開交古澗寒泉一度澆且問今日在何處與前後放光聻遂爇香云燒掃廩山忠祖塔磨得青萍倚石眠拂衣而起金剛穿十年冷地疏泉源塔頂再紅白日圓且道今來一掃將以何者了此時節因緣確然卓筆衝蒼天廩山孤立數百仞舊題參天一筆掃壽昌老祖塔鋤破好山翻身跳出西江頂上吞吐霹靂炎午中間開宗第一卻讓不肖兒孫苕帚上五花八劈且道以何酬恩力耶一莖草上千秋碧掃二世見如老和上塔關中迸出一聲蛙指據青天掛彩霞二十年不動聲色立此山家白雲谷口多少手又今我重來苔逕綻千生只潑一杯茶為竺菴和上設供同門雙眼不識面載回南岳舟中見重來師表堂雙手聊一獻且喜多子塔錦縫披金殿到底功成不處返毘盧且看屋痕光閃青霄電插香云正恁麼時還在南岳在壽昌聻古爐再插三檀條香雲覆卻娑婆遍為雙峰和上設供咬指流胸好兄弟南岳西江一口氣黃龍背上留藥地重來毘目開不閉無開閉松枝掛劍霜風礪為其天和上設供竹關一聲奉送石耳飛鳶過嶺空傷腳指雖然坐斷是非門換手槌胸今未己靈苗栽石長新枝且澆萬年橋下水到長慶為空隱和上設供騎牛入佛殿貪程不覺曉末後一聲不辜負回頭擲杖山山好金輪白氣信夙因華首海幢乘月笑等閑坐斷準提壇金殿重重彈指造七箇蒲團懶道場鍬鋤櫛栗又手笑且道青原智行者到此以何為供聻從誇鄉果荔枝紅滿林古幹青相照掃鼓山永覺老和上塔金雞啄破碧琉璃棒下翻身為甚疑不跨石門穿過也掀天吞海有何奇如我鼓山永覺老和尚人人盡道九峰岳降示金剛師壽昌嫡骨午運總持是誰見他鎔銅淬雪施禮樂又誰知他移山喝水嬰兒嘻不免五千鈍置黃金鎖八十棒腹嗟瘡痍最後留毒龍擺尾換人錦縫丹青圍多生此生信啼笑千里一埽誠萋萋卻笑何必來打遮破鼓也是沸地墮枕齁此時且道今日承何願力當得供養聻海潮歸岳頂渴筆蘸天池報親古航和上塔前上供一航舞渡無今古兩岸中流都不住人人盡道是博山滴乳按其生平不打遮鼓滴水滴凍為著何來寓言答問誰知辛苦磨碎五位虀粉圖書煉人垂足只是一斧獅狐齊掃放龍光問取報親菴露柱秪如今日上供還道得甚麼好聻究竟無語到武夷石屏掃東苑老祖塔烹壽昌乳令夢筆吐盡謂海底吞龍又道巖邊嘯虎多少人望崖而返自問雙蛾長幾許遮莫來打瞎悟門別行一路到遮裏大王峰獅子峰立在兩傍石屏巖定命橋白雲封住不肖兒孫遠來一掃又作何句九曲千秋流不去東苑老祖像前上供撞壽昌之牢關奪博山之險砦向在石屏巖下二十年也只為著推倒趙州莫作怪今日一杯白水欲望受供未審以何為驗耶咳便插香廩山上梁木頭不解語指出天心柱澗水滴碎五更鐘半夜雷雨為伐鼓北窗石壁直塞青霄南抱岡陵為我分土一枝夢筆偶爾揮空莖草剎竿一時橫壴以拄杖擊梁令眾起云大家看取是甚東西作主天界老和尚生忌拈香神前臺盞紙灰供養後世批毛刮髓只得者滴眼淚拈香云影裏傳聲生生晦氣且道將牛糞作香燒畢竟為著何事年年臘月下一場雪梅花迸破山門翠便禮拜嘯峰大師訃至設靈炷香半生倪夫子七載白雲庫劫火入杖門棲霞只一步樸菴遯參改笑峰不覺一笑天地通熄邪之雷不可少捄東震西一莖草青原鈯斧破虛空笑趁蒲鞋一齊掃竹關三載感雪恩濺血迸碎玄黃門今日香爐安得不倒地倒此灰堆如何出氣啐天界老和尚周忌拈香黃花剛謝西風吹鷓鴣依舊三更飛自從刀頭撞倒太平攔路錐十年并作一年啼醍醐毒藥塗虎皮托孤異類哀支離以香熱爐中云即今不得喚作燒香不得喚作詩題烈煙觸著傷心處不是傷心人不知便拜先老和上忌辰拈香師云風風雨雨近重陽歲歲朝朝一斷腸恰有汋林寒澗水曹溪嶺背點蒿湯無色味不聞香此毒何人肯再嘗為五中兼禪人起龕師云五中禪人半生屹嶪波吒末後孤危壁立十三年前許了天界卻在汋林八箇月拌命酬直秪為倒卻剎竿一句塞斷咽喉五中你如今了也送汝烈焰斜陽看佛日從今燒卻無生窟舉火師云西風急蒼煙直四面八風吹不入以炬打圓相云萬里神光破碧飛且得通紅痛快金剛骨壽昌其天和尚訃至設供師云煖多變雨北風怒又聞吹折黃龍一枝樹壽昌主人重過飛鳶嶺途中撒手來時路雖道不同條隻履何嘗有來去莫問其天法兄向何處今日一杯溪澗水且荅十年燒佛句為敬梅老僧火師云汋林多年飯足汝口百不會中撞彩也有直等到烹雪堂裏許多人來轉雨為晴大家出手舉火炬云者箇火把能成一切能壞一切且道不受成壞底在甚麼處擲炬云只問金剛心決不隨他走跋孔子集堯舜禹湯文周之大成藥地老人集諸佛祖師之大成時也非人也孔子時無諸佛祖師之教故集堯舜禹湯文周之大成而諸佛祖師之教寓其中老人本傳堯舜禹湯文周之道轉而集諸佛祖師之大成而堯舜禹湯文周之道寓其中時也非人也教以時起道以時行何莫非異類中行乎何莫非因法救法乎何莫非乘午會協兼中乎杖人翁於刀兵水火求天下大傷心人為之托孤老人南北兩逼熅火捨身不二破籃莖艸遇緣即宗是天地因時而生老人復因老人之時而生杖人可思議哉夫時之不得不病病之不得不藥藥之不得不就醫王也一橛者一橛昆侖者昆侖別路者別路無記頑空者暗癡膠執標幢鬥勝者莽蕩滑疑惟以不立文字為了涅槃不以不離文字用窮差別卒歸護短強勝妄執愈增差別未明涅槃亦未曉佛祖冤乎哉老人之時乘也以無我為過關以不自欺為薪火合尼山正示鷲嶺大過漆園旁擊而一之明乎公因反因正知遍知證此五位天然秩序寂歷同時之大符所謂透過向上打殺向上同患盡分決於中節然後知醫王集大成而後能應病予藥也如或專提向上則赤子之惡亦善矣礦土之善亦惡矣赤子礦土非惡也不當乎理不適乎用善而不得謂之善也興㲈向侍青原兩閉冬關父子恩深刀斧莫入亥子之交守櫬五雲苫山瓦燈重蒐語錄編之歸而藏諸浮山時主席浮山為吾法兄山足大師觸著痛處急願流通既成浮志之餘共襄剞劂相與拍掌而喜謂老人為杖人托孤即為諸佛祖師托孤即為堯舜禹湯文周托孤實為孔子托孤也火焦露日枯筍生光時也非人也繼而悲謂以此報前之大傷心人復以此望之天下後世之大傷心人識法者懼知音者稀時也非人也藥地侍子方中通法名興㲈百拜敬識余觀從上聖人未有不處困而亨者尼山統仁知而不得其位老子談道德而未廣其傳釋迦證真常而人多不信然而三聖之法至今塞天地不衰誠所謂處困而亨者也至華嚴五地菩薩具無量智現無量身說無量法寓仁義道德忠信節孝及醫卜曆數皆歸真常又非恒等所及吾師藥地老人臨難捨身踏完天地而歸不二窮盡一切而乘中和以大才而成大孝移大孝而持大節全大節而秉大願總持三教烹炮古今歸于鼎薪非現五地身而說三聖之法者歟非處困而亨者歟末後受囑于杖人翁擔荷曹洞大法計出世二十餘年說法多處語錄若干卷位白兄于萬安患難苫次中編輯成帙此又以處困而亨者為刀斧不開之一證也斧奉老人命住浮渡華嚴勉力既成茲山之志復與位兄謀為語錄流通因緣時節或自有在庶不負老人因法救法之苦心也時丙辰重九吉州門人興斧百拜敬識
