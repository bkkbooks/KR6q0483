front:
  text: 青原愚者智禪師語錄目次卷首序卷一上堂卷二小參示眾卷三法語偈讚卷四佛事跋序以鏡為有像珠為有色非知鏡與珠者也謂像呈而鏡不受色至而珠不隨亦非知鏡與珠者也謂鏡受像為塵珠隨色為纇必離像以求鏡屏色以求珠尤非知鏡與珠者也予於智大師蓋三遇而失之而今始憮然如有當也潛夫先生嘗撫楚軍忤要人得禍矢為不佞詩成秩歲壬午得解謂予楚產所見略同屬為之序時大師周旋左右溫柔敦厚粹然容止間竊謂是聞詩不愚者猶之以像為鏡色為珠也而不知其世深于易潔靜精微也壬辰避人臣之極位以比丘身訪予匡廬肩大布衲遊行即以為臥具別無鞋袋缽囊亦復不求伴侶日類十百里無畏無疲至使予覿面不相識審視乃寤為故人則又驚歎曰大丈夫現大人相若此豈將相所能為猶之謂世有不受像之鏡不隨色之珠也而不知其一無有乃能容眾有百不緣乃能涉眾緣初非遺棄世務徒取聲聞人涅槃為樂也是後山川間阻彼此問遺率浮沉不達祗聞其于莊易之書深入無際將以了杖人所未了傳家世所不傳至韋編絕不休也則又拊几曰衲僧手腳提一寸鐵直下斷人命根拈一莖草立地起人痼疾何取于鋒攢刃簇馬載驢馱得無其熟難忘乎猶之謂像為鏡塵色為珠纇必屏棄色像而後鏡與珠覿露也而不知一無有之法不可見正于其容萬有見之百不緣之玅無可徵正于其涉眾緣徵之欲離相像以求鏡而己之像已先在鏡中欲屏色以珠而身所有色已先在珠中更有何術能舍之別求耶越二十年庚戌其門人至黃山出大師語錄見示併得其所為鼎薪一編而讀之而後知言默不載之道言非默亦非言默不載之人默得言亦得也不然世尊說法五十年而于人天罔措中獨有取乎破顏笑祖師航海千萬里而于群然呈解時獨有取乎依位立豈非第一等傳持而為之子孫者顧有君臣父子玄要主賓種種別異獨不虞道火而口燒乎蓋天然節奏天然錯綜初不以思議起亦不容思議沒一一住其法位而後破顏依位之旨可得而明也亦猶萬像雜陳不但無損于鏡之明而鏡之明乃益顯五色互見不但無染于珠之淨而珠之淨乃益彰若祗取澄潭月影怖見波瀾或徒以莽蕩儱侗蓋其孤陋求免于大師癡狂之誚不亦難乎然世尊三昧迦葉不知迦葉三昧阿難不知狸奴白牯三昧諸佛不知吾于大師雖幾幸屢失而得之過此以往仍未之或知也已苟讀是錄而輒以為大師盡于是猶為大師謾過未可謂大師知己也寓黃山雲谷法弟正志題
