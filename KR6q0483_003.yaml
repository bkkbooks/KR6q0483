body:
  text: 侍子興磬同門人興斧編法語室中正訓佛有一語三昧正語三昧愛語三昧學者先從正語入將世味道味劈作兩開只要作得主不為外物轉立志既定根基堅固始有信入參究分起信論曰衆生有自力廣聞取解者或自力少聞多解者或無自力因廣論得解者或樂總持少聞攝多義取解者雖以無思契同必從聞解信入靈源曰法門有樂說者以無言為非有尚默者以多語為過皆據一知一見為局量而不知無量之量為通途也具正見建圓機人忽倦普慈如天澤無心物均獲利白樂天舉佛經同異問濟公覺範代云方便智三言而已一代時教以法相宗破相宗法性宗攝之法之所本要本于理而當于義不必守名句以自滯至于言謂之不及而可以模鑄佛魔了辨同異者又未可遽言也永明壽曰解但為遣情耳說但為破執耳情消執謝則說解何存真性了然寂無存泯一菴曰物各還其物之則即是物不遷稱權無我斤兩不爽是則方便智乃本自現成者也特人不能死盡偷心而享此善用耳靈源謂圓悟曰學者雖有見道之資若不深蓄厚養發用必峻暴非特無補於教門將恐有招禍辱圓悟告大慧曰須防自己三業忽起此語最切單方顯勝撮弄筒子氣急殺人誤而可乎古人道德學問藏於腦後不露圭角事不得已吐出還吞今人出一叢林入一保社才見一隅不能三反竊得語録上奇言妙句機鋒知解便逞口頭惟恐人不知我之長處是則參禪一回止成得一肚皮我慢貢高而已不知於生死上有何相干嗟乎末世凡夫根器頑鈍識見偏淺立行不遠操心非實中此邪毒道聽塗說永嘉所歎莽蕩招殃安能不齰舌耶惟有當下知非便許立地成佛溈山禪師曰事理不二即如如佛圓覺經言事障理障何也事本無障以貪欲昏蔽而障之也理安有障以黠智偏執而障之也銷鎔情識全體自露然自無始以來習氣流轉便欲一刀兩斷豈容易哉故須以參究為事提起此事則一切自然放下久久自得古人道愛之則是愛礦棄之則是棄金此處指出甚難一番烹煉何故蹉過依舊半青半黃菽麥不分安得不去自欺欺人也耶即能遮掩得來作僞心勞日拙大可憐憫言至乎此皮下有血能不猛省回心自照一掌翻轉慶快有分昔之高人浮雲富貴淡於勢利者不自名其高故往往自寓曰懶今學者入門未得一角如何飾詞藉口放逸切須警敏盡職參學自勉若是正人開眼自然行起解滅笑和尚曰人生下地皆有職職盡方能無愧色衰年本欲討閒身不是百忙閒不得覺範禪師曰為學日益百川浸灌也為道日損水落石出也苟非為學日益又安知為道之日損哉正氣曰損是損其情欲益是益其正知故曰學事以成務致用也學道者自反至誠而已果然徹上徹下由此中行則學事猶茶飯也本茂則末自榮不見道本末盡歸宗或問曰理雖可以頓悟習氣難以卒除須盡今時一等倚混沌無記空者便云誰見有習氣可盡是否曰習氣不可盡而可化故以學問為茶飯若以差別言之有必不免之習氣饑必食寒必衣倦必眠之類節之而已有必當化之習氣驕妒鄙倍之類是也當仁不讓見義不避堅志不移好學不厭是亦謂之習氣乎是不可以總殺總赦而混之也上根大人超一切法之外而遊一切法之中正用時宜彼不喚做習氣樵夫十字街何問中書堂事且去擔柴保不誤汝示蕭小翮居士高峰妙禪師曰紅塵堆裏學山居寂莫身心道有餘但得胸中憎愛盡不參禪也是工夫秪為衆生情膠識錮佛以種種方便如剝芭蕉紅塵中汩汩茫茫無本可據枯木崖前差路多誤中執著其病愈深故學道人必須開眼必須參究從專門深入不能專深故令從疑處入沒奈何提箇話頭大慧杲教人提狗子無佛性博山教人提一口氣不來畢竟向何處去提此一句即金剛刀一切截斷人人自有迸破時節紙盡且住示蕭虎符學易逐今時之後但覺動頤紛紜推空劫以前便覽杳冥寂感智者互換舉之新建云鐘未鳴時轟天赫地鐘既鳴時寂天寞地尚疑此耶大小長短虛實一切代錯惠秉琦辨豈逃此乎程迥曰太極者大中也禮記提為大本易言成位乎中中何物乎宗鏡言三種權中三種實中又言五中道又曰中不定中又曰無中無邊曾疑此耶此中之秩序條理隨在畢具隨物可徵聖人表之變變不變神無方物有則全符如是故知一不可言言則是二易以象數為端幾而至精至變至神在其中研極者知之物格無物知致無知又何言哉儒者人事處分株守常格至于俯仰遠近曆律醫占會通神明多半茫然夫物物一太極即物物一河洛而信不及乎宗門止提了心方便而一切實法置為不屑夫法住法位五明一實原自妙協時人得少為足耳惟易統之以費知隱以隱行費即無費隱矣逆幾于先順理於後即無先後矣格物之則即天之則即心之則繼之以法因物用物是真無我大我至尊深幾神哉豫行天下鮮見有好學不厭者高明既肯研極邇靜正而遠不禦神明默成請從此入示侍子中通興㲈深幾之中忽有悟入此其一長當一切以方圓圖通之其綱宗曰秩敘變化同時即華嚴之行布不礙圓融圓融不礙行布即費即隱三教妙協矣汝復于象數有入處正所以享其不墮諸數者也公因反因藏于此矣天地人物皆器也皆道也有法則而無情識故曰格物之則即天之則即心之則故倚此秩序變化寂歷同時之符處處皆然欲忿一平發皆中節矣易其可不學哉所以破有無之說曰天無先後中有條理舍後窮先所以引人入勝地而變化之也示趙眉魯興翱字藥雲李翱為鼎州刺史躬謁藥山山執經卷不顧侍者曰太守在此守性急曰見面不如聞名拂袖便出山曰太守何得貴耳賤目守回拱謝問曰如何是道山以手指上下曰會麼守曰不會山曰雲在青天水在瓶守欣愜作禮述偈曰鍊得身形似鶴形千株松下兩函經我來問道無餘說雲在青天水在瓶云云示魯兩吉興準兩吉居士名哲一日入青原求更其字愚者引抑之什字曰辰告此謝安石所舉蔽三百之一言也辰時也時義大矣哉兩吉寂然感通因禮而求取法名愚者曰不見準提心印之為佛母乎易以天地準變變不變損益時行證惟心者我即天地然其深入必在研參支公曰世可說兩入三則亂信耶疑耶即從此研研以專真用以會通是真所謂兩吉乎因名曰興準字研參題辰告軒願與天下時損益而言之示即幾興偉惟深也故通天下之志惟幾也故能成天下之務惟神也故不疾而速不行而至此易所以極深研幾而昌格適綸也天下之理得而成位乎中中何物乎時出措宜而惡動頤又何物乎今人聞甚深則怖豈悟深無深淺而止實哉聖人立象以盡意繫詞以盡情僞佛祖表法以最神而因幾以盡情僞楞嚴雙非非而曰非即非離又曰是即非即何故多此一句猶疑此即否向上不傳向下文長折攝離微此中難言惟端幾可研耳以不自欺入豁然一即一切一切即一猶嫌匝匝之波即務養神事同理舉猶嫌屑屑之勞歟幾失神明欺則不能享矣真疑即此立參脫桶即此茶飯能逃不能逃汝自驗之非干他事示山足興斧靜住禪人舊事祖堂石溪大師有年還里又炙西生大師教乘滋茂回互宗趣今來青原訊其本分不昧疑關以山足字更其名愚者曰青原垂一足住山唯鈯斧且劈古今薪冷灶自燒煮因命之曰興斧且問揮八極碎一切者是何斧耶不犯大軱當門露刃用了急磨四顧善藏者鈯何鈯耶無上兩足尊與一足行千古有同別耶此處砉然無滯則盡六合是青山一切森羅供我之磨藏矣深入一門猶專煉通擔荷保任豈屬空言乎勉之勉之示中千賢監院忠禪師云悟道易明道難明道如禁蛇人信其藥力咒力以蛇綰弄揣懷袖中無難未知藥咒等力者怖駭棄去但諦見自心情見便破此無他知其故而不惑耳楞伽曰諸法無法體而說惟是心不見于自心而起于分別或舉以問雲居齊曰見自心遂分別乎齊曰非然也譬如調馬馬自見其影而不驚何以故以自知其影從自身出故吾是以知不斷分別亦捨心相此無他智度論所謂善用其心者博山曰毫釐繫念三途業因瞥爾情生萬劫枷鎖將以有念為有念有情為有情耶將以無念為無念無情為無情耶一菴曰兩末三窮遇緣即宗用中猶不豁乎紫柏曰以四大觀身而無身相所謂無身有事之雙超也以前境觀心有心用而無我執所謂因物付物之本空也法外無心即是心外無法而法中之秩序物則之差別其可茫然混用乎心本無體神自無方何更空勞穿鑿乎銷礦成金必資知識此事盡時乃享現量安得絶蘇發願與定綱宗示非渠會書記常念汝胃脘氣痛須靜攝乃愈今兼室安居過夏事亦不煩母論痛不痛不可坐在無事甲裏古人謂一日不空過者何故叮嚀耶大抵一半自調養一半自煉本分自試薪火偷心歇天機活比現更何計較古人云心本無體正用即得尚疑此耶切忌靠著放憨語錯認最是誤事示即幾偉侍者薪火調御動靜不失其時法住法位比量皆現量也天機自活偷心自亡古今總是我底真擔當即真解脫如或未然十二時中管帶切不可忽處處回光消歸自己即是管帶必有事行無事何用更言管帶乎善自調御病亦不生又體道集虛處事平實為貴不可認著慌忽一切便流入莽蕩矣及盡今時惟在知有而奉重自己閒居鼓舞只以學問為茶飯故曰戒懼是一刻之樂事此超無學者之飛躍也學而不厭是大聖人之隨緣放曠也又偉子且住靜不見潛道十年之青膺乎臨濟曰諸方火葬我這裏活埋此時親受用著不徒說鑊湯爐炭衆苦不能到也氈蒲團與汝跋宙輪宇矩說示山足斧宙逝宇素彌範綸圍而無中無邊享此條理中矣歷盡理法界煉事法界乃享此無礙信解行證火候豈可欺哉末流竊一句荒委寧不唶唶宇宙本一際也真空妙有妙協兼中非窮盡者烏可以言到乎真心細心即行布是圓成混不得也偶然簡出舊紙正好吹毛用磨斧子勉之命山足斧為浮山監院浮渡為遠祖道場兩宗一脈杖人所最存注者今吳山主一家同合邑來請愚者以青原祖堂未畢面依山主約先發執事人今命山足斧往監理其事古人叮嚀悟心識法止有一事實行起解滅豈復容一念離岐靈源叟曰悟道守道惟求諸己而行道之時一味捨己從人自非等心死誓則不能擔此擔子末流發願不真輕浮淺躁襲虛凌傲動見眉目又安望其和衆辦行而成徑大傳遠之務乎常住當家公心為法反躬先衆不辭勞苦所謂一行三昧行之不變自然感孚十方則祖翁田地庶幾有賴矣努力努力又悟道明道只在一番打徹根本差別而已行道難者全在放下自己與衆生一般隨順中接引而針錐變化之故曰佛不住佛而用大菩薩行示當人鑒副寺不自欺為種以學問為茶飯而神化則豈筆舌所可言乎南泉所送一敘亦言混沌與開闢為反因但發至誠公願統之而日用隨薪泯火自享深造隨其更端我皆得其所宜而不為所惑蓋有貫乎混沌開闢之中而隨時中節者忽為其波瀾所紛也牧潛為天隱子元時禪師其手筆乃覺範以後之一人將來穿出不可被混抹也示瑞如廩山源遠流長我杖人夢寐為此一事竺菴笑峰二和尚相繼注神而未遑得遂今幸時節開端樹起梁柱舊山田地次第自然渠水我今出門瑞如老成監事料理自有壽昌主之寶坊又近但礪鐵脊又何憂焉古人化米化炭桶箍自脫破屋縮項唱雪珍珠看是何等家風豈使兩橛固知三斤钁頭斷然不相負耳勉之勉之示喪偶老宿永豐程天修過訪陶菴見喪偶老宿在葉聲閣上禮大悲熟視之乃豐橋德幢主人也愚詢之天修曰二十年前修吾邑石橋成四萬金功德邑侯方旌禮謝之彼必不受又強之遂夜不知所往合邑作德幢菴塑師像其中後十年師回知之自推其像而去今何在此愚者曰此多生藥樹之蔭乎天修請書之遂占數語曰陽豐橋起德幢不居敝屣遠遊天下吾廬恰遇故人為君道破稽首大士一葉聲墮南郭嗒然東方眉先莫住龍老請安眠示侍子中履物惡其棄于地也不必為己有力惡其不出于己也不必為己此物理小識之隨人集證也託人問人皆不犯其鋒芒而以通幾護質測之窮何所礙乎時論以秩序變化寂歷同時為宗方圓同時奇恆之府即多是一皆統類於此矣神無方準不亂宗門多言神無方而準不亂則以象數為端幾而信倫理之為固然者也但用之則在乎推行化裁耳大凡推之于先多屬洸洋任之于後則動頤而迷兩頭俱抹過者剔中乎中不定中也正明其時也此中之秩序條理本自現成特因幾務而顯耳格物之則即天之則即心之則豈患執有則膠執無則荒哉若空窮其心則倏忽如幻故吾以莊子談虛無而乃曰極物而止以有形象無形者而定矣佛亦是以費知隱乃能以行隱費但不露其金針耳炮莊是遣放之書消心最妙者不執也不計也妙于藏鋒無所不具可細心看之與西峰蠡測澥靜主古人所謂能超一切法能入一切法應病豫藥恰當竅䏿鏡照谷響開門落臼俱享眼明己正為大自在非傍水按葫盧而以苟且唐捐也叢林依止以蓮池意整理接待正是我壽昌不二家風遇其人來手眼不失雲居行履話寶鏡收場句塵塵三昧不動絲毫詎容造作推諉耶在事依法管帶更享天然火柴頭三斤鐵截卻玄妙不讓人躲跟明矣即以此院鉗鎚可也勉之勉之偈示劉若孩居士并序知止是以夜而通晝夜者格物是以晝而通晝夜者也三反晝夜尚有疑乎既曰潛龍勿用又曰無所不用其極亦晝夜也定乃能格致格致是謂大定以不用善其用以用善其不用用之中皆不用者也尚有疑乎如其舉一不能悱三且從一門深入谷王非下頂門無上虀粉中間誰卓拄杖蓏理相齒物則知天其神無方別傳不傳既以易證就路履旋一句畫前須破重玄止一事實畢卻後先三反晝夜通因乎專生成裁成時宜乘權日午三更歷然寂然示王若先居士并引萬物皆備于我萬我皆備于物轉山河大地歸自己則易轉自己歸山河大地則難適來舉此然疑作耶且從下二句看一飲一蔭思我然疑公因反因從來未提幬覆代錯掌不可欺無我備物中旁先迷生死發藥來處唯唯分心分識紗縠難窺甕外運甕治正兵奇縣崖絶蘇大願綸彌午會中天消息偕時核仁全樹且請研幾示梁懿孫居士見見之時見不及物物不物休氣急三科七大何郎當薪火交蘆誰主張圓滿菩提歸無所得且問一切事究竟堅固那箇著力噥噥空纍優陀南一嚏自不欺消息示廖生公居士宇觀人間宙觀世山谷狼藉三藏祕是誰點燧照一際不攀斷貫索凡例柷敔訛傳疑啞鐘韶舞拍板定不易穿過千生未生前桑弧蓬矢一㘞地方圓亦是栗棘圈欣逢許劍真法器跳出三籠隨類示可破五雲書卍字示陳高也居士無作無受報不忘維摩經中己露布蓮花法位三如是窮子何乃復驚懼四邊火起誰上車虛空消殞歸何處若疑且過趙州關問事即得禮拜去示梁山甫居士一切法無我得成於忍莫贏其瓶呼出井應無所住而生其心八角磨盤休沉吟不取於相亦不取非相子午雙破紅輪光放金剛如是降伏住書懋緩筋請平步豁然大笑歸去來簷下雙扉不誤主顧示非渠會渠今正是我我今不是渠以驢覷井井覷驢從上直須破紗縠曹山四禁非糊塗又首楞珍重盡今時寶所蓮花不負伊磨淬金剛揮紫電轉輪擊節是誰知示即幾偉偉哉造化笑棲苴不負其材乃丈夫大屈大伸天煆煉藏刀淬火看回途示山足斧時己酉臘八日青原垂一足住山唯鈯斧且劈古今薪冷灶自燒煮又命斧住浮山浮渡棋聲在眼前通天陌路讓誰先石頭壁立常伸指一斧供薪足煮泉為蠡測澥維那更字傳澥只在一滴吸上須彌背脊鐵鞋踏乾重溟莫教人笑蠡測除夕示中子興㲈念汝隨豫學環中竟左旋冬春看兩度頭尾算三年風送新花雨詩將舊夢圓沖之傳曆意誰與問青天示當仁鑑副寺岱堂三年瓦生角淨居三年扶木杓泥豬癩狗了尊貴雪爐霜刃鋪禮樂獨喜石頭裂出真肝腸潛道青鷹展血覺示焦泉澄知客真金本以火為恩不閡無門四出門久祝沃焦泉上頂針鋒眼裏造乾坤示洞先山侍者過水不是渠覿面不是水曹山當門劍孝滿者善使如何為洞先將來慎牙齒示還子徵侍者八還卻向無還者虛空流汗天地啞正淬金剛磨處藏豈怕打殺四天下寄芥菴璨并杖人全録還鄉曲調露幡竿納盡須彌已轉九唯有杖門莖草在待伊招手與人看示襄藏蘊侍者石頭引汝吸西江日用吾諧何處藏看破漉籬還可賣超宗亦不數襄陽十年劈出血肝腸今日新硎何處藏正顯罩籬神變化一雙赤手舞風霜示王青蓮法名興詢字南指福城東際見文殊須許南詢道不孤樓閣指頭開復閉急須穿過莫黏塗示林祖涵法名興雷字蟄協冬雪藏雷春莫驚八風圖上自何生此中見得無先在九野重霄總帝京示魯維參法名興參字靈注靈源流注問參同明暗回機莫倚空主中相續須親見母擲光陰四境風示劉兆公法名興奉字曉藏黃閣簾前奉者誰三更天曉甚東西多生鑄此當空鏡藏在森羅十二時為劉寒竹孫取法名法周字華始縱橫卍字本周天立地揆方統大圓無首履旋何內外此中包決在龍淵溪示翠屏把住水雷奔收入茶爐蟹眼吞噴雪軒中肝膽句西風為我掃蓬門示學者一句話頭如鐵橛百層水釜烹丹雪冬關埋出一聲雷驚風又涉花枝血一句話頭如鐵橛壁立銀山四面絶從中起一陳風雷丹枕三更為汝說一句話頭如鐵橛當風掃帚無車轍誰能一躍上縣崖舍命乘雲㘞地絶棲霞和尚新定天開巖遣僧展拜兼禮笑大師龕天開巖下合龍文生死同條石火焚今在西江流片紙一爐燒作故山雲禮遠公塔劍鋩山頭慣放腳雙關一帶同殺活殘枰敲破通天眼那問黑白落不落寄孫魯山居士須彌頂上種青玉縮作方壺供金栗且引襄陽舞袍笏愚公自笑移香谷寄吳湯日居士時命山足斧住華嚴三一齊中白眼青通晝夜灑甘露餅憂患憂孟與塗炭輐斷謑髁者何限洗出浮渡一片石三十六巖聽揮斤白雲老挂先著堂坐隱遠公棋道場卻拓鈯斧期爛柯從今沒奈旁觀何自讚首山賢監院請濯熱蓮花消永晝笑煞觀河眉不皺摩羅果拋擲掌中拄杖放在背後無所可用乾坤消瘦後來人切忌從壁上看料定虛空看不透雙嶺淵西堂請蒼天過水看三墮右袂自嗤肩臂左怪殺禮樂鋪在紅爐𥳽漫說當堂不正坐多少人論量敝垢丹青誰知它解衣盤礡贏蠡測海維那請一張紙雲遮海樹一拂子劈破鐵圍忽然在西峰壁上不覺垂此霜眉換卻眼睛初不知滾滾聽人隔岸揮朱紫敝垢皆支離不可便道是青原老古錐非渠會書記請南北東西無所住為甚走入芥子煙中去木葉三毛勞顧虎迸破面門誰得而相汝即幾偉書記請白刃舞毫端紅爐書卍字世出世間要且不識三十年後呿一口氣虛空特地費丹青且莫嫌寒山一帚敝浮山斧監院請一杯浮渡黑白未分前已露須知袖手滿盤先谷口傳聲是誰常住將以華嚴樓閣為毗目故處依然此藏軒裏一指隨寓聊且懸崖背後讓煙熏休管萬世旦暮遇遇則遇還看席卷竿頭步當仁鑑副寺請六合中間擲一拂依然豎起殘榾柮且問這個東西是何物擊節一下答不出雖許三拜掩灰塵畢竟以何為它雪屈像讚血畫接引佛今古漫天都是血無端浸破衣裳折一雙窮相手長伸腳下蓮花望誰接彌勒佛雲頭墮在街頭掛一幅包此人間大樓開閣閉指尖閒撞倒背後拍一下滿布袋是甚東西百雜碎無人著價待問他時有理難伸但消得一個嗄嗄達摩杖人常有些兒藥留待他年毒達摩只為折蘆面壁太煞捏怪隻履歸去一場懡㦬忽遇點睛者如何崑崙粉碎揚秋波觀音大士此一筆當頭劈蘭葉太軟鐵線太直衲衣下事從來讚嘆不及爭似泥塑木雕換飯喫又第二筆蒙頭屈膝看他不出不妨數九不可打七腳酸且坐斷虛空冷風卻笑人獨立又第三筆通身濕乾卻洛伽波平地擲楖栗千手千眼在那裏依舊眉橫鼻直蒲團像粉碎崑崙不問津春風冷眼笑紅塵漫勞雲裏金剛杵一個蒲團到處尊送子像楊柳灑水呼麒麟寶髻放光如車輪是誰蒿筆成五色蓮花瓣裏乾坤新壽亭侯金剛刀挂兩眉前燈下春秋聽世傳莫問本來何面目且看血色濺蒼天鼓山永覺老和尚不跨石門三十年捧腹垂涕看蒼天早知不肯打這破鼓且樂得在沸鼎裏安眠天界浪老和尚一張白紙放毫光莫認紅衣與面黃返擲依然在坐下且認手中如意子可是金剛王又三五縱橫只一畫千花萬石夢中抹佛祖位裏留不住白刃紅爐鋪禮樂縫起來雙袖托孤可怪是兩頭一腳且道今日以何報答震聲一喝
